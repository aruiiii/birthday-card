<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.font.im/css?family=Happy+Monkey" rel="stylesheet">
    <style>
        body{
            padding: 0;
            margin: 0;
            background: linear-gradient(#a2d2ff,pink);

            color: #ffffff;
            text-align: center;
            text-shadow: 0 0 1px black;
        }

        .header{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content:start;

            font-family: 'Happy Monkey', cursive;
        }

        #avatar{
            border: 5px solid #efb0c9;
            border-radius: 50%;
            width: 150px;
        }

        .header h2,.header h4{
            background: #efb0c9;
            padding: 5px 10px;
            border-radius: 3px;
            margin: 0;
        }

        .header h2{
            margin: 10px 0;
        }

        .header h4{
            margin-bottom: 60px;
        }

        .main h3{
            margin: 0;
        }

        .gift{
            width: 300px;
            height: 300px;
            margin: 0 auto 50px;
            border:3px solid #ffffff;
            background-image: url(./images/gift.webp) ;
            background-size: cover;
        }

        #gift1:hover,#gift2:hover,#gift3:hover{
            background-image: url(./images/gift-hover.webp);
        }

        #gift4{
            height: 200px;
        }

        .footer{
            width: 330px;
            margin: 0 auto 30px;
        }

        .footer p a,.footer p a:visited, .footer p a:link{
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Today is arui's birthday🎉</h1>
        <img id="avatar" src="./images/Avatar.jfif" alt="">
        <h2>24 years old</h2>
        <h4>15.08.2026</h4>
    </div>
    
    <div class="main">
        <h3>Here's how happy i am for you today🥳</h3>
        <h4>(hover over the gift)</h4>
        <div  class="gift" id="gift1"></div> 
        </div>

        <h3>How people react when you enter the room</h3>
        <div class="gift" id="gift2"></div>

        <h3>How people react when you enter the room</h3>
        <div class="gift" id="gift3"></div>

        <h3>this one is for you,my friends</h3>
        <div class="gift" id="gift4"></div>
    </div>

    <div class="footer">
        <p>want to create your own birthday site?take <a href="https://scrimba.com/learn/htmlandcss" target="_blank">this Html & Css course.</a></p>
    </div>
</body>
</html>
